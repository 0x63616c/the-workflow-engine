pre-push:
  commands:
    no-push-main:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ]; then
          echo "ERROR: Direct push to main blocked. Use a PR." && exit 1
        fi

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,css}"
      exclude: ".claude/skills/**"
      run: bunx biome check --write {staged_files}
      stage_fixed: true
    typecheck:
      run: bun run typecheck
    test:
      run: bunx vitest run --changed
    boundaries:
      run: bun run check:boundaries
    swiftformat:
      glob: "*.swift"
      run: swiftformat {staged_files}
      stage_fixed: true
    plist-lint:
      glob: "*.plist"
      run: |
        for f in {staged_files}; do
          plutil -lint "$f" || exit 1
        done
    yaml-lint:
      glob: "*.{yml,yaml}"
      exclude: ".claude/**"
      run: yamllint -d relaxed {staged_files}
    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}
    no-env:
      glob: ".env*"
      exclude_tags:
        - example
      run: |
        for f in {staged_files}; do
          if [ "$f" != ".env.example" ] && [ "$(basename "$f")" != ".env.example" ]; then
            echo "ERROR: $f must not be committed" && exit 1
          fi
        done
