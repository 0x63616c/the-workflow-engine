display_information:
  name: Evee
  description: The best bot! <3
  background_color: "#000000"
features:
  bot_user:
    display_name: Evee
    always_online: false
oauth_config:
  scopes:
    bot:
      # Messaging
      - chat:write
      - chat:write.public
      - chat:write.customize
      # Channels
      - channels:read
      - channels:history
      - channels:manage
      - channels:join
      - channels:write.invites
      - channels:write.topic
      # Private channels
      - groups:read
      - groups:history
      - groups:write
      - groups:write.invites
      # DMs
      - im:read
      - im:history
      - im:write
      # Group DMs
      - mpim:read
      - mpim:history
      - mpim:write
      # Reactions / Pins / Bookmarks
      - reactions:read
      - reactions:write
      - pins:read
      - pins:write
      - bookmarks:read
      - bookmarks:write
      # Files
      - files:read
      - files:write
      # Users
      - users:read
      - users:read.email
      - users.profile:read
      - users:write
      # App features
      - app_mentions:read
      - assistant:write
      - commands
      - links:read
      - links:write
      - metadata.message:read
      # Workflows / Canvases / Calls
      - canvases:read
      - canvases:write
      - calls:read
      - calls:write
      - workflows.templates:write
      # Connections
      - connections:write
      - conversations.connect:manage
      - conversations.connect:read
      - conversations.connect:write
      # DND
      - dnd:read
      # Misc
      - emoji:read
      - team:read
      - usergroups:read
      - usergroups:write
      - reminders:read
      - reminders:write
    user:
      - channels:history
      - channels:read
      - channels:write
      - chat:write
      - emoji:read
      - files:read
      - files:write
      - groups:history
      - groups:read
      - groups:write
      - im:history
      - im:read
      - im:write
      - links:read
      - mpim:history
      - mpim:read
      - mpim:write
      - pins:read
      - pins:write
      - reactions:read
      - reactions:write
      - reminders:read
      - reminders:write
      - search:read
      - users:read
      - users:read.email
      - users.profile:read
      - users.profile:write
      - dnd:read
      - dnd:write
      - identify
      - stars:read
      - team:read
  pkce_enabled: false
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
