apiVersion: 1

# Root notification policy: everything goes to #errors. Group by alertname
# + source container so a burst of the same error in one service folds into
# a single Slack message rather than spamming the channel.
policies:
  - orgId: 1
    receiver: slack-errors
    group_by:
      - alertname
      - container
    group_wait: 10s
    group_interval: 2m
    repeat_interval: 1h
