service: evee

image: 0x63616c/evee

ssh:
  user: calum

servers:
  web:
    hosts:
      - homelab
    options:
      add-host: host.docker.internal:host-gateway

proxy:
  # Two hosts on purpose. Don't "clean this up" to one.
  #
  # - homelab              : external traffic (laptop/iPad over Tailscale → homelab:80).
  # - host.docker.internal : internal loopback from the inngest accessory back
  #                          into this app for function auto-sync.
  #
  # Inngest runs `--sdk-url http://host.docker.internal/api/inngest` to
  # rediscover our functions on every restart. That request goes through
  # kamal-proxy with Host: host.docker.internal; kamal-proxy must own that
  # hostname or it 404s. Without both entries, Evee goes silent after any
  # inngest accessory reboot. See PR #338/#339 and 2026-04-20's downtime.
  hosts:
    - homelab
    - host.docker.internal
  ssl: false
  app_port: 4301
  healthcheck:
    path: /up
    interval: 3
    timeout: 5

registry:
  server: ghcr.io
  username: "0x63616c"
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  remote: ssh://calum@homelab
  arch: arm64
  args:
    BUILD_HASH: <%= `git rev-parse --short HEAD`.strip %>
    VITE_WIFI_SSID: <%= ENV["VITE_WIFI_SSID"] %>
    VITE_WIFI_PASSWORD: <%= ENV["VITE_WIFI_PASSWORD"] %>
    VITE_FARO_URL: "/api/collect"
    VITE_BUILD_HASH: <%= `git rev-parse --short HEAD`.strip %>

env:
  clear:
    NODE_ENV: production
    PORT: "4301"
    PORT_OFFSET: "0"
    INNGEST_DEV: "0"
    INNGEST_BASE_URL: "http://evee-inngest:8288"
    HA_URL: "http://host.docker.internal:8123"
    ALLOY_URL: "http://evee-alloy:12346"
  secret:
    - INNGEST_EVENT_KEY
    - INNGEST_SIGNING_KEY
    - HA_TOKEN
    - DATABASE_URL
    - SLACK_BOT_TOKEN
    - SLACK_APP_TOKEN
    - OPENROUTER_API_KEY

accessories:
  postgres:
    image: postgres:16-alpine
    host: homelab
    port: "5432:5432"
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: evee
        # POSTGRES_DB intentionally omitted. Databases are now declared
        # in infra/postgres/initdb/*.sql and mounted below, so a fresh
        # volume creates evee + inngest automatically via
        # the postgres image's /docker-entrypoint-initdb.d hook.
    files:
      - infra/postgres/initdb/01-evee.sql:/docker-entrypoint-initdb.d/01-evee.sql
      - infra/postgres/initdb/02-inngest.sql:/docker-entrypoint-initdb.d/02-inngest.sql
    directories:
      - postgres-data:/var/lib/postgresql/data

  inngest:
    # Config lives in infra/inngest/config.yaml — mounted below. Keeping
    # runtime tuning (tick, poll, workers, postgres-uri) out of deploy.yml
    # so future tweaks are a single-file PR.
    image: inngest/inngest
    cmd: inngest start --config /etc/inngest/config.yaml
    host: homelab
    port: "8388:8288"
    options:
      add-host: host.docker.internal:host-gateway
    files:
      - infra/inngest/config.yaml:/etc/inngest/config.yaml
    env:
      secret:
        - INNGEST_EVENT_KEY
        - INNGEST_SIGNING_KEY
        # Full Postgres URI built at deploy time (CI workflow + scripts/deploy).
        # Inngest reads this as an env var override of --postgres-uri. We don't
        # put the password in infra/inngest/config.yaml because Inngest uses
        # Viper, which doesn't expand ${VAR} in YAML values — the literal
        # string gets passed to the driver. See PR #340's review.
        - INNGEST_POSTGRES_URI

  loki:
    image: ghcr.io/0x63616c/evee-loki:latest
    host: homelab
    port: "3100:3100"
    directories:
      - loki-data:/loki

  alloy:
    image: ghcr.io/0x63616c/evee-alloy:latest
    host: homelab
    cmd: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    options:
      publish:
        - "12345:12345"
        - "12346:12346"
      volume:
        - "/var/run/docker.sock:/var/run/docker.sock:ro"

  grafana:
    image: ghcr.io/0x63616c/evee-grafana:latest
    host: homelab
    port: "3000:3000"
    directories:
      - grafana-data:/var/lib/grafana
    env:
      clear:
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
        GF_SERVER_ROOT_URL: "http://homelab:3000"
      # Injected by Grafana into /etc/grafana/provisioning/alerting/*.yaml
      # via its built-in $VAR expansion. Create an incoming webhook in
      # Slack targeted at #errors (C0AV61FPQ8G), store in 1Password as
      # `op://Homelab/Grafana Errors Slack Webhook`, then reference
      # here via .kamal/secrets.
      secret:
        - GRAFANA_ERRORS_SLACK_WEBHOOK_URL
