service: workflow-engine

image: 0x63616c/the-workflow-engine

ssh:
  user: calum

servers:
  web:
    hosts:
      - homelab
    options:
      network: kamal

proxy:
  host: workflow-engine.local
  ssl: false
  app_port: 4301

registry:
  server: ghcr.io
  username: "0x63616c"
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  remote: homelab
  arch: arm64

env:
  clear:
    NODE_ENV: production
    PORT: "4301"
    PORT_OFFSET: "0"
    INNGEST_DEV: "0"
  secret:
    - INNGEST_EVENT_KEY
    - INNGEST_SIGNING_KEY

accessories:
  inngest:
    image: inngest/inngest
    cmd: inngest start
    host: homelab
    port: "8388:8288"
    options:
      network: kamal
    env:
      secret:
        - INNGEST_EVENT_KEY
        - INNGEST_SIGNING_KEY

volumes:
  - data:/app/data
