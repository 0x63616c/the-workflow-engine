service: workflow-engine

image: 0x63616c/the-workflow-engine

ssh:
  user: calum

servers:
  web:
    hosts:
      - homelab
    options:
      add-host: host.docker.internal:host-gateway

proxy:
  host: homelab
  ssl: false
  app_port: 4301
  healthcheck:
    path: /up
    interval: 3
    timeout: 5

registry:
  server: ghcr.io
  username: "0x63616c"
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  remote: ssh://calum@homelab
  arch: arm64
  args:
    BUILD_HASH: <%= `git rev-parse --short HEAD`.strip %>

env:
  clear:
    NODE_ENV: production
    PORT: "4301"
    PORT_OFFSET: "0"
    INNGEST_DEV: "0"
    HA_URL: "http://host.docker.internal:8123"
  secret:
    - INNGEST_EVENT_KEY
    - INNGEST_SIGNING_KEY
    - HA_TOKEN
    - DATABASE_URL

accessories:
  postgres:
    image: postgres:16-alpine
    host: homelab
    port: "5432:5432"
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: workflow
        POSTGRES_DB: workflow_engine
    directories:
      - postgres-data:/var/lib/postgresql/data

  inngest:
    image: inngest/inngest
    cmd: inngest start
    host: homelab
    port: "8388:8288"
    env:
      secret:
        - INNGEST_EVENT_KEY
        - INNGEST_SIGNING_KEY

  loki:
    image: ghcr.io/0x63616c/workflow-engine-loki:latest
    host: homelab
    port: "3100:3100"
    directories:
      - loki-data:/loki

  alloy:
    image: ghcr.io/0x63616c/workflow-engine-alloy:latest
    host: homelab
    port: "12345:12345"
    cmd: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    options:
      volume:
        - "/var/run/docker.sock:/var/run/docker.sock:ro"

  grafana:
    image: ghcr.io/0x63616c/workflow-engine-grafana:latest
    host: homelab
    port: "3000:3000"
    directories:
      - grafana-data:/var/lib/grafana
    env:
      clear:
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
        GF_SERVER_ROOT_URL: "http://homelab:3000"

