service: evee

image: 0x63616c/evee

ssh:
  user: calum

servers:
  web:
    hosts:
      - homelab
    options:
      add-host: host.docker.internal:host-gateway

proxy:
  hosts:
    - homelab
  ssl: false
  app_port: 4301
  healthcheck:
    path: /up
    interval: 3
    timeout: 5

registry:
  server: ghcr.io
  username: "0x63616c"
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  remote: ssh://calum@homelab
  arch: arm64
  args:
    BUILD_HASH: <%= `git rev-parse --short HEAD`.strip %>
    VITE_WIFI_SSID: <%= ENV["VITE_WIFI_SSID"] %>
    VITE_WIFI_PASSWORD: <%= ENV["VITE_WIFI_PASSWORD"] %>
    VITE_FARO_URL: "/api/collect"
    VITE_BUILD_HASH: <%= `git rev-parse --short HEAD`.strip %>

env:
  clear:
    NODE_ENV: production
    PORT: "4301"
    PORT_OFFSET: "0"
    HA_URL: "http://host.docker.internal:8123"
    ALLOY_URL: "http://evee-alloy:12346"
  secret:
    - HA_TOKEN
    - DATABASE_URL
    - SLACK_BOT_TOKEN
    - SLACK_APP_TOKEN
    - OPENROUTER_API_KEY

accessories:
  postgres:
    image: postgres:16-alpine
    host: homelab
    port: "5432:5432"
    env:
      secret:
        - POSTGRES_PASSWORD
      clear:
        POSTGRES_USER: evee
        # POSTGRES_DB intentionally omitted. Databases are now declared
        # in infra/postgres/initdb/*.sql and mounted below, so a fresh
        # volume creates the evee DB automatically via the postgres
        # image's /docker-entrypoint-initdb.d hook.
    files:
      - infra/postgres/initdb/01-evee.sql:/docker-entrypoint-initdb.d/01-evee.sql
    directories:
      - postgres-data:/var/lib/postgresql/data

  loki:
    image: ghcr.io/0x63616c/evee-loki:latest
    host: homelab
    port: "3100:3100"
    directories:
      - loki-data:/loki

  alloy:
    image: ghcr.io/0x63616c/evee-alloy:latest
    host: homelab
    cmd: run --server.http.listen-addr=0.0.0.0:12345 --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    options:
      publish:
        - "12345:12345"
        - "12346:12346"
      volume:
        - "/var/run/docker.sock:/var/run/docker.sock:ro"

  grafana:
    image: ghcr.io/0x63616c/evee-grafana:latest
    host: homelab
    port: "3000:3000"
    directories:
      - grafana-data:/var/lib/grafana
    env:
      clear:
        GF_AUTH_ANONYMOUS_ENABLED: "true"
        GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
        GF_SERVER_ROOT_URL: "http://homelab:3000"
      # Injected by Grafana into /etc/grafana/provisioning/alerting/*.yaml
      # via its built-in $VAR expansion. Create an incoming webhook in
      # Slack targeted at #errors (C0AV61FPQ8G), store in 1Password as
      # `op://Homelab/Grafana Errors Slack Webhook`, then reference
      # here via .kamal/secrets.
      secret:
        - GRAFANA_ERRORS_SLACK_WEBHOOK_URL
