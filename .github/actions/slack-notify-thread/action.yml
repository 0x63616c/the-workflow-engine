name: Slack Notify Thread
description: Post a status message to a Slack thread

inputs:
  channel:
    description: Slack channel ID
    required: true
  thread_ts:
    description: Parent message timestamp for threading
    required: true
  message:
    description: Message text (supports mrkdwn)
    required: true
  emoji:
    description: 'Optional emoji prefix for the message'
    required: false
    default: ''
  slack_bot_token:
    description: Slack bot token
    required: true

runs:
  using: composite
  steps:
    - name: Post to thread
      shell: bash
      env:
        SLACK_BOT_TOKEN: ${{ inputs.slack_bot_token }}
        INPUT_CHANNEL: ${{ inputs.channel }}
        INPUT_THREAD_TS: ${{ inputs.thread_ts }}
        INPUT_MESSAGE: ${{ inputs.message }}
        INPUT_EMOJI: ${{ inputs.emoji }}
      run: |
        if [ -n "$INPUT_EMOJI" ]; then
          DISPLAY_TEXT="${INPUT_EMOJI}  *${INPUT_MESSAGE}*"
        else
          DISPLAY_TEXT="*${INPUT_MESSAGE}*"
        fi
        curl -s -X POST "https://slack.com/api/chat.postMessage" \
          -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
          -H "Content-Type: application/json; charset=utf-8" \
          -d "$(jq -n \
            --arg channel "$INPUT_CHANNEL" \
            --arg thread_ts "$INPUT_THREAD_TS" \
            --arg text "$DISPLAY_TEXT" \
            '{
              channel: $channel,
              thread_ts: $thread_ts,
              text: $text,
              blocks: [
                {
                  type: "context",
                  elements: [
                    { type: "mrkdwn", text: $text }
                  ]
                }
              ]
            }')"
