name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workflow
          POSTGRES_PASSWORD: workflow
          POSTGRES_DB: workflow_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://workflow:workflow@localhost:5432/workflow_engine_test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: bunx biome ci .
          - name: Typecheck
            command: bun run typecheck
          - name: Test
            command: bun run test
          - name: Boundaries
            command: bun run check:boundaries
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: ${{ matrix.command }}

  shell:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ShellCheck
            command: find . -name '*.sh' -not -path './.git/*' | xargs shellcheck
          - name: shfmt
            command: find . -name '*.sh' -not -path './.git/*' | xargs shfmt -d -i 2 -ci
          - name: Shell Guards
            command: bash .claude/hooks/test-guards.sh
    steps:
      - uses: actions/checkout@v6
      - uses: mfinelli/setup-shfmt@v2
      - run: ${{ matrix.command }}
