name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: evee
          POSTGRES_PASSWORD: evee
          POSTGRES_DB: evee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://evee:evee@localhost:5432/evee_test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: bunx biome ci .
          - name: Typecheck
            command: bun run typecheck
          - name: Test
            command: bun run test
          - name: Boundaries
            command: bun run check:boundaries
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: ${{ matrix.command }}

  migrate:
    name: Migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: evee
          POSTGRES_PASSWORD: evee
          POSTGRES_DB: evee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://evee:evee@localhost:5432/evee_test
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run migrations
        run: cd apps/api && bun run db:migrate

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build --build-arg BUILD_HASH=${{ github.sha }} -t evee:ci .

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: bun run test:e2e

  screenshot-names:
    name: Screenshot Naming
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Enforce YYYY-MM-DD-HH-MM- prefix on screenshots
        run: |
          failed=0
          for f in e2e/screenshots/*.png docs/screenshots/*.png; do
            [ -f "$f" ] || continue
            if ! basename "$f" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2}-'; then
              echo "ERROR: bad screenshot name: $f (must start with YYYY-MM-DD-HH-MM-)"
              failed=1
            fi
          done
          exit $failed

  shell:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ShellCheck
            command: find . -name '*.sh' -not -path './.git/*' | xargs shellcheck
          - name: shfmt
            command: find . -name '*.sh' -not -path './.git/*' | xargs shfmt -d -i 2 -ci
          - name: Shell Guards
            command: bash .claude/hooks/test-guards.sh
    steps:
      - uses: actions/checkout@v6
      - uses: mfinelli/setup-shfmt@v2
      - run: ${{ matrix.command }}
