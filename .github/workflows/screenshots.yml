name: PR Screenshots

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "libs/shared/**"
      - "e2e/**"
      - "playwright.config.ts"

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Screenshots
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('**/bun.lockb') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Take screenshots
        run: bun run screenshots

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: e2e/screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Commit screenshots to branch
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/screenshots/
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "ci: update PR screenshots"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post screenshots to PR
        uses: actions/github-script@v7
        env:
          SCREENSHOTS_CHANGED: ${{ steps.commit.outputs.changed }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const screenshotDir = 'e2e/screenshots';
            if (!fs.existsSync(screenshotDir)) {
              console.log('No screenshots directory found');
              return;
            }

            const files = fs.readdirSync(screenshotDir)
              .filter(f => f.endsWith('.png'))
              .sort();

            if (files.length === 0) {
              console.log('No screenshots found');
              return;
            }

            const sha = context.payload.pull_request.head.sha.substring(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const rawBase = `https://raw.githubusercontent.com/${repo}/${branch}`;

            let body = `## Screenshots (${sha})\n\n`;
            body += `> iPad Pro 12.9" (2048x2732 @2x) | `;
            body += `[Download artifact](${context.serverUrl}/${repo}/actions/runs/${context.runId})\n\n`;

            for (const file of files) {
              const name = path.basename(file, '.png')
                .replace(/^\d+-/, '')
                .replace(/-/g, ' ')
                .replace(/\b\w/g, c => c.toUpperCase());
              body += `### ${name}\n`;
              body += `![${name}](${rawBase}/e2e/screenshots/${file})\n\n`;
            }

            body += `---\n*Auto-generated by PR Screenshots workflow*`;

            // Find and update existing bot comment (single comment, no spam)
            const MARKER = '## Screenshots (';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user?.type === 'Bot' && c.body?.startsWith(MARKER)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created screenshot comment');
            }
