name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/ios/**'
      - 'apps/web/capacitor.config.ts'
      - 'apps/web/package.json'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

concurrency:
  group: ios-build
  cancel-in-progress: true

env:
  SLACK_CHANNEL: C0ASD1161UJ

jobs:
  notify-start:
    name: Notify Build Start
    runs-on: ubuntu-latest
    outputs:
      thread_ts: ${{ steps.slack.outputs.ts }}
      start_time: ${{ steps.timer.outputs.start_time }}
      bufo: ${{ steps.bufo.outputs.emoji }}
    steps:
      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Pick bufo spinner
        id: bufo
        run: |
          if [ $((RANDOM % 4)) -eq 0 ]; then
            echo "emoji=:bufo-offers-a-loading-spinner-spinning:" >> "$GITHUB_OUTPUT"
          else
            echo "emoji=:bufo-offers-a-loading-spinner:" >> "$GITHUB_OUTPUT"
          fi

      - name: Post build start to Slack
        id: slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg bufo "${{ steps.bufo.outputs.emoji }}" \
              '{
                channel: $channel,
                text: ("iOS Build started: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: (":iphone: iOS Build " + $bufo), emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "` " + $commit) }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Build>") }
                    ]
                  }
                ]
              }')")
          TS=$(echo "$RESPONSE" | jq -r '.ts')
          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          if [ "$TS" = "null" ] || [ -z "$TS" ]; then
            echo "::warning::Slack notification failed"
            echo "$RESPONSE" | jq .
          fi

      - name: Post context to thread
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ steps.slack.outputs.ts }}" \
              --arg author "$COMMIT_AUTHOR" \
              --arg branch "${{ github.ref_name }}" \
              --arg sha "${{ github.sha }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Build context",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("*Author:* " + $author) },
                      { type: "mrkdwn", text: ("*Branch:* `" + $branch + "`") },
                      { type: "mrkdwn", text: ("*Commit:* `" + ($sha | .[:7]) + "`") }
                    ]
                  }
                ]
              }')"

  build:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    needs: notify-start
    defaults:
      run:
        working-directory: apps/web/ios
    timeout-minutes: 30
    outputs:
      build_duration: ${{ steps.build-duration.outputs.text }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build web
        run: bun run build
        working-directory: apps/web

      - name: Capacitor sync
        run: bunx cap sync ios
        working-directory: apps/web

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/web/ios

      - name: Update parent message with building state
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg bufo "${{ needs.notify-start.outputs.bufo }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Building for TestFlight...",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ($bufo + "  *Building for TestFlight...*") }
                    ]
                  }
                ]
              }')"
        working-directory: .

      - name: Record build start time
        id: build-timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and upload to TestFlight
        run: bundle exec fastlane release
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Calculate build duration
        id: build-duration
        if: always()
        run: |
          START=${{ steps.build-timer.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

  notify-result:
    name: Notify Build Result
    runs-on: ubuntu-latest
    needs: [notify-start, build]
    if: always()
    steps:
      - name: Calculate pipeline duration
        id: duration
        run: |
          START=${{ needs.notify-start.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

      - name: Build succeeded
        if: needs.build.result == 'success'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              --arg build_number "${{ github.run_number }}" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("iOS Build #" + $build_number + " succeeded: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":iphone: iOS Build :white_check_mark:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "` " + $commit) }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Build> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg build_duration "${{ needs.build.outputs.build_duration }}" \
              --arg build_number "${{ github.run_number }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Build uploaded to TestFlight",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: (":white_check_mark:  *Build #" + $build_number + " uploaded to TestFlight* (" + $build_duration + ")") }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "white_check_mark"
              }')"

      - name: Build failed
        if: needs.build.result == 'failure'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("iOS Build failed: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":iphone: iOS Build :x:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "` " + $commit) }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Build> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg build_duration "${{ needs.build.outputs.build_duration }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Build failed",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (":x:  *Build failed* (" + $build_duration + ") — <" + $run_url + "|Logs>")
                    }
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "x"
              }')"

      - name: Build cancelled
        if: needs.build.result == 'cancelled'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("iOS Build cancelled: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":iphone: iOS Build :black_square_for_stop:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "` " + $commit) }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Build> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Build cancelled",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: (":black_square_for_stop:  *Build cancelled* (" + $duration + ") — <" + $run_url + "|Logs>") }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "black_square_for_stop"
              }')"
