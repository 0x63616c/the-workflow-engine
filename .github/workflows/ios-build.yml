name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/ios/**'
      - 'apps/web/capacitor.config.ts'
      - 'apps/web/package.json'
      - '.github/workflows/ios-build.yml'
  schedule:
    - cron: '0 12 1 * *' # 1st of every month at noon UTC, keeps TestFlight build fresh (90-day expiry)
  workflow_dispatch:

concurrency:
  group: ios-build
  cancel-in-progress: true

env:
  SLACK_CHANNEL: C0ASD1161UJ

jobs:
  notify-start:
    name: Notify Build Start
    runs-on: ubuntu-latest
    outputs:
      thread_ts: ${{ steps.notify.outputs.thread_ts }}
      start_time: ${{ steps.notify.outputs.start_time }}
      bufo: ${{ steps.notify.outputs.bufo }}
    steps:
      - uses: actions/checkout@v6

      - name: Notify start
        id: notify
        uses: ./.github/actions/slack-notify-start
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          title: iOS Build
          emoji: ':iphone:'
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          commit_message: ${{ github.event.head_commit.message || 'Scheduled build' }}
          sha: ${{ github.sha }}
          commit_url: ${{ github.event.head_commit.url || format('{0}/{1}/commit/{2}', github.server_url, github.repository, github.sha) }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          author: ${{ github.event.head_commit.author.name || 'GitHub Actions' }}
          branch: ${{ github.ref_name }}

  build:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    needs: notify-start
    defaults:
      run:
        working-directory: apps/web/ios
    timeout-minutes: 30
    outputs:
      build_duration: ${{ steps.build-duration.outputs.text }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: .

      - name: Build web
        run: bun run build
        working-directory: apps/web

      - name: Capacitor sync
        run: bunx cap sync ios
        working-directory: apps/web

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/web/ios

      - name: Notify building in thread
        uses: ./.github/actions/slack-notify-thread
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          thread_ts: ${{ needs.notify-start.outputs.thread_ts }}
          message: Building for TestFlight...
          emoji: ${{ needs.notify-start.outputs.bufo }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Record build start time
        id: build-timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Build and upload to TestFlight
        run: bundle exec fastlane release
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Calculate build duration
        id: build-duration
        if: always()
        run: |
          START=${{ steps.build-timer.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

  notify-result:
    name: Notify Build Result
    runs-on: ubuntu-latest
    needs: [notify-start, build]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Notify result
        uses: ./.github/actions/slack-notify-result
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          thread_ts: ${{ needs.notify-start.outputs.thread_ts }}
          start_time: ${{ needs.notify-start.outputs.start_time }}
          result: ${{ needs.build.result }}
          title: iOS Build
          emoji: ':iphone:'
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          commit_message: ${{ github.event.head_commit.message || 'Scheduled build' }}
          sha: ${{ github.sha }}
          commit_url: ${{ github.event.head_commit.url || format('{0}/{1}/commit/{2}', github.server_url, github.repository, github.sha) }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          step_duration: ${{ needs.build.outputs.build_duration }}
          result_message: 'Build #${{ github.run_number }} uploaded to TestFlight'
