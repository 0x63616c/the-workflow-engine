name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  statuses: write

env:
  SLACK_CHANNEL: C0ASR5837ED

jobs:
  notify-start:
    name: Notify Pipeline Start
    runs-on: ubuntu-latest
    outputs:
      thread_ts: ${{ steps.notify.outputs.thread_ts }}
      start_time: ${{ steps.notify.outputs.start_time }}
      bufo: ${{ steps.notify.outputs.bufo }}
    steps:
      - uses: actions/checkout@v6

      - name: Notify start
        id: notify
        uses: ./.github/actions/slack-notify-start
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          title: Deploy Pipeline
          emoji: ':rocket:'
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          commit_message: ${{ github.event.head_commit.message }}
          sha: ${{ github.sha }}
          commit_url: ${{ github.event.head_commit.url }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          author: ${{ github.event.head_commit.author.name }}
          branch: ${{ github.ref_name }}

  check:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: notify-start
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Lint
            command: bunx biome ci .
          - name: Typecheck
            command: bun run typecheck
          - name: Test
            command: bun run test
          - name: Boundaries
            command: bun run check:boundaries
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: ${{ matrix.command }}

  notify-checks:
    name: Notify Checks Result
    runs-on: ubuntu-latest
    needs: [notify-start, check]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Calculate checks duration
        id: duration
        run: |
          START=${{ needs.notify-start.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

      - name: Checks passed
        if: needs.check.result == 'success'
        uses: ./.github/actions/slack-notify-thread
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          thread_ts: ${{ needs.notify-start.outputs.thread_ts }}
          message: 'Checks passed — lint, typecheck, tests, boundaries (${{ steps.duration.outputs.text }})'
          emoji: ':white_check_mark:'
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Checks failed
        if: needs.check.result == 'failure'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "${{ steps.duration.outputs.text }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Checks failed",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (":x:  *Checks failed* (" + $duration + ") — <" + $run_url + "|Logs>")
                    }
                  }
                ]
              }')"

  check-logging-changes:
    name: Check Logging Changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.logging }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            logging:
              - 'infra/logging/**'

  build-logging-images:
    name: Build Logging Images
    runs-on: ubuntu-latest
    needs: [check, check-logging-changes]
    if: needs.check.result == 'success' && needs.check-logging-changes.outputs.changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHRC_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Loki
        uses: docker/build-push-action@v6
        with:
          context: infra/logging/loki
          platforms: linux/arm64
          push: true
          tags: ghcr.io/0x63616c/workflow-engine-loki:latest
          cache-from: type=gha,scope=loki
          cache-to: type=gha,mode=max,scope=loki

      - name: Build and push Alloy
        uses: docker/build-push-action@v6
        with:
          context: infra/logging/alloy
          platforms: linux/arm64
          push: true
          tags: ghcr.io/0x63616c/workflow-engine-alloy:latest
          cache-from: type=gha,scope=alloy
          cache-to: type=gha,mode=max,scope=alloy

      - name: Build and push Grafana
        uses: docker/build-push-action@v6
        with:
          context: infra/logging/grafana
          platforms: linux/arm64
          push: true
          tags: ghcr.io/0x63616c/workflow-engine-grafana:latest
          cache-from: type=gha,scope=grafana
          cache-to: type=gha,mode=max,scope=grafana

  deploy:
    name: Deploy to Homelab
    runs-on: ubuntu-latest
    needs: [notify-start, check, build-logging-images]
    if: always() && needs.check.result == 'success' && (needs.build-logging-images.result == 'success' || needs.build-logging-images.result == 'skipped')
    outputs:
      deploy_duration: ${{ steps.deploy-duration.outputs.text }}
    steps:
      - uses: actions/checkout@v6

      - name: Update parent message with loading state
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg bufo "${{ needs.notify-start.outputs.bufo }}" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("Deploying: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: (":rocket: Deploy Pipeline " + $bufo), emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "` " + $commit) }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline>") }
                    ]
                  }
                ]
              }')"

      - name: Notify deploying in thread
        uses: ./.github/actions/slack-notify-thread
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          thread_ts: ${{ needs.notify-start.outputs.thread_ts }}
          message: Deploying to homelab...
          emoji: ${{ needs.notify-start.outputs.bufo }}
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Resolve homelab via Tailscale IP
        run: echo "100.78.116.17 homelab" | sudo tee -a /etc/hosts

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          echo "Host homelab
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: Install Kamal
        run: sudo gem install kamal

      - name: Login to GHCR
        run: echo "${{ secrets.GHRC_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Ensure accessories are running
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHRC_TOKEN }}
          INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
          INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: bin/ensure-accessories

      - name: Record deploy start time
        id: deploy-timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Deploy with Kamal
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHRC_TOKEN }}
          INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
          INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: kamal deploy

      - name: Calculate deploy duration
        id: deploy-duration
        if: always()
        run: |
          START=${{ steps.deploy-timer.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

  notify-result:
    name: Notify Deploy Result
    runs-on: ubuntu-latest
    needs: [notify-start, deploy]
    if: always()
    steps:
      - uses: actions/checkout@v6

      - name: Set commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            STATE="success"
            DESC="Deploy pipeline succeeded"
          elif [ "${{ needs.deploy.result }}" = "failure" ]; then
            STATE="failure"
            DESC="Deploy pipeline failed"
          elif [ "${{ needs.deploy.result }}" = "cancelled" ]; then
            STATE="failure"
            DESC="Deploy pipeline cancelled"
          else
            STATE="failure"
            DESC="Deploy skipped — checks failed"
          fi
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state="$STATE" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            -f description="$DESC" \
            -f context="deploy/pipeline"

      - name: Notify result
        uses: ./.github/actions/slack-notify-result
        with:
          channel: ${{ env.SLACK_CHANNEL }}
          thread_ts: ${{ needs.notify-start.outputs.thread_ts }}
          start_time: ${{ needs.notify-start.outputs.start_time }}
          result: ${{ needs.deploy.result }}
          title: Deploy Pipeline
          emoji: ':rocket:'
          slack_bot_token: ${{ secrets.SLACK_BOT_TOKEN }}
          commit_message: ${{ github.event.head_commit.message }}
          sha: ${{ github.sha }}
          commit_url: ${{ github.event.head_commit.url }}
          run_url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          step_duration: ${{ needs.deploy.outputs.deploy_duration }}
          result_message: 'Deployed — the app is now live'
          extra_links: '<http://homelab|App>'
