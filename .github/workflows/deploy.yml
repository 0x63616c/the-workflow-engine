name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  SLACK_CHANNEL: C0ASR5837ED

jobs:
  notify-start:
    name: Notify Pipeline Start
    runs-on: ubuntu-latest
    outputs:
      thread_ts: ${{ steps.slack.outputs.ts }}
      start_time: ${{ steps.timer.outputs.start_time }}
    steps:
      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Post pipeline start to Slack
        id: slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                channel: $channel,
                text: ("Pipeline started: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":rocket: Deploy Pipeline", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline>") }
                    ]
                  }
                ]
              }')")
          TS=$(echo "$RESPONSE" | jq -r '.ts')
          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          if [ "$TS" = "null" ] || [ -z "$TS" ]; then
            echo "::warning::Slack notification failed"
            echo "$RESPONSE" | jq .
          fi

      - name: Post context to thread
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ steps.slack.outputs.ts }}" \
              --arg author "${{ github.event.head_commit.author.name }}" \
              --arg branch "${{ github.ref_name }}" \
              --arg sha "${{ github.sha }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deploy context",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("*Author:* " + $author) },
                      { type: "mrkdwn", text: ("*Branch:* `" + $branch + "`") },
                      { type: "mrkdwn", text: ("*Commit:* `" + ($sha | .[:7]) + "`") }
                    ]
                  }
                ]
              }')"

  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    needs: notify-start
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Biome CI
        run: bunx biome ci .

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Check import boundaries
        run: bun run check:boundaries

  notify-checks:
    name: Notify Checks Result
    runs-on: ubuntu-latest
    needs: [notify-start, check]
    if: always()
    steps:
      - name: Checks passed
        if: needs.check.result == 'success'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Checks passed",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ":white_check_mark:  *Checks passed* — lint, typecheck, tests, boundaries" }
                    ]
                  }
                ]
              }')"

      - name: Checks failed
        if: needs.check.result == 'failure'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Checks failed",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (":x:  *Checks failed* — <" + $run_url + "|View Logs>")
                    }
                  }
                ]
              }')"

  deploy:
    name: Deploy to Homelab
    runs-on: ubuntu-latest
    needs: [notify-start, check]
    steps:
      - uses: actions/checkout@v4

      - name: Notify deploying
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deploying to homelab...",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ":hourglass_flowing_sand:  *Deploying to homelab...*" }
                    ]
                  }
                ]
              }')"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Resolve homelab via Tailscale IP
        run: echo "100.78.116.17 homelab" | sudo tee -a /etc/hosts

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          echo "Host homelab
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: Install Kamal
        run: sudo gem install kamal

      - name: Login to GHCR
        run: echo "${{ secrets.GHRC_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Deploy with Kamal
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHRC_TOKEN }}
          INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
          INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: kamal deploy

  notify-result:
    name: Notify Deploy Result
    runs-on: ubuntu-latest
    needs: [notify-start, deploy]
    if: always()
    steps:
      - name: Calculate duration
        id: duration
        run: |
          START=${{ needs.notify-start.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy succeeded
        if: needs.deploy.result == 'success'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("Deploy succeeded: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":rocket: Deploy Pipeline :white_check_mark:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deployed successfully",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: (":white_check_mark:  *Deployed — the app is now live* (" + $duration + ")") }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "white_check_mark"
              }')"

      - name: Deploy failed
        if: needs.deploy.result == 'failure'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("Deploy failed: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":rocket: Deploy Pipeline :x:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deploy failed",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (":x:  *Deploy failed* (" + $duration + ") — <" + $run_url + "|Logs>")
                    }
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "x"
              }')"

      - name: Deploy skipped (checks failed)
        if: needs.deploy.result == 'skipped'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("Deploy skipped: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":rocket: Deploy Pipeline :no_entry_sign:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deploy skipped — checks failed",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (":no_entry_sign:  *Deploy skipped* (" + $duration + ") — <" + $run_url + "|Logs>")
                    }
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "no_entry_sign"
              }')"
