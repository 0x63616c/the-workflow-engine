name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  SLACK_CHANNEL: C0ASR5837ED

jobs:
  notify-start:
    name: Notify Pipeline Start
    runs-on: ubuntu-latest
    outputs:
      thread_ts: ${{ steps.slack.outputs.ts }}
      start_time: ${{ steps.timer.outputs.start_time }}
    steps:
      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Post pipeline start to Slack
        id: slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          RESPONSE=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{
                channel: $channel,
                text: ("Pipeline started: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":rocket: Deploy Pipeline", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline>") }
                    ]
                  }
                ]
              }')")
          TS=$(echo "$RESPONSE" | jq -r '.ts')
          echo "ts=$TS" >> "$GITHUB_OUTPUT"
          if [ "$TS" = "null" ] || [ -z "$TS" ]; then
            echo "::warning::Slack notification failed"
            echo "$RESPONSE" | jq .
          fi

      - name: Post context to thread
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ steps.slack.outputs.ts }}" \
              --arg author "$COMMIT_AUTHOR" \
              --arg branch "${{ github.ref_name }}" \
              --arg sha "${{ github.sha }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deploy context",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("*Author:* " + $author) },
                      { type: "mrkdwn", text: ("*Branch:* `" + $branch + "`") },
                      { type: "mrkdwn", text: ("*Commit:* `" + ($sha | .[:7]) + "`") }
                    ]
                  }
                ]
              }')"

  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    needs: notify-start
    outputs:
      duration: ${{ steps.duration.outputs.text }}
    steps:
      - name: Record start time
        id: timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Biome CI
        run: bunx biome ci .

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Check import boundaries
        run: bun run check:boundaries

      - name: Calculate duration
        id: duration
        if: always()
        run: |
          START=${{ steps.timer.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

  notify-checks:
    name: Notify Checks Result
    runs-on: ubuntu-latest
    needs: [notify-start, check]
    if: always()
    steps:
      - name: Checks passed
        if: needs.check.result == 'success'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg duration "${{ needs.check.outputs.duration }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Checks passed",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: (":white_check_mark:  *Checks passed* — lint, typecheck, tests, boundaries (" + $duration + ")") }
                    ]
                  }
                ]
              }')"

      - name: Checks failed
        if: needs.check.result == 'failure'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "${{ needs.check.outputs.duration }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Checks failed",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (":x:  *Checks failed* (" + $duration + ") — <" + $run_url + "|Logs>")
                    }
                  }
                ]
              }')"

  build-logging-images:
    name: Build Logging Images
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHRC_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Loki
        uses: docker/build-push-action@v6
        with:
          context: infra/logging/loki
          platforms: linux/arm64
          push: true
          tags: ghcr.io/0x63616c/workflow-engine-loki:latest
          cache-from: type=gha,scope=loki
          cache-to: type=gha,mode=max,scope=loki

      - name: Build and push Alloy
        uses: docker/build-push-action@v6
        with:
          context: infra/logging/alloy
          platforms: linux/arm64
          push: true
          tags: ghcr.io/0x63616c/workflow-engine-alloy:latest
          cache-from: type=gha,scope=alloy
          cache-to: type=gha,mode=max,scope=alloy

      - name: Build and push Grafana
        uses: docker/build-push-action@v6
        with:
          context: infra/logging/grafana
          platforms: linux/arm64
          push: true
          tags: ghcr.io/0x63616c/workflow-engine-grafana:latest
          cache-from: type=gha,scope=grafana
          cache-to: type=gha,mode=max,scope=grafana

  deploy:
    name: Deploy to Homelab
    runs-on: ubuntu-latest
    needs: [notify-start, check, build-logging-images]
    outputs:
      deploy_duration: ${{ steps.deploy-duration.outputs.text }}
    steps:
      - uses: actions/checkout@v6

      - name: Pick bufo spinner
        id: bufo
        run: |
          if [ $((RANDOM % 10)) -eq 0 ]; then
            echo "emoji=:bufo-offers-a-loading-spinner-spinning:" >> "$GITHUB_OUTPUT"
          else
            echo "emoji=:bufo-offers-a-loading-spinner:" >> "$GITHUB_OUTPUT"
          fi

      - name: Update parent message with loading state
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1)
          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg bufo "${{ steps.bufo.outputs.emoji }}" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("Deploying: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: (":rocket: Deploy Pipeline " + $bufo), emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline>") }
                    ]
                  }
                ]
              }')"

      - name: Notify deploying in thread
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg bufo "${{ steps.bufo.outputs.emoji }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deploying to homelab...",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ($bufo + "  *Deploying to homelab...*") }
                    ]
                  }
                ]
              }')"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Resolve homelab via Tailscale IP
        run: echo "100.78.116.17 homelab" | sudo tee -a /etc/hosts

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          echo "Host homelab
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null" >> ~/.ssh/config

      - name: Install Kamal
        run: sudo gem install kamal

      - name: Login to GHCR
        run: echo "${{ secrets.GHRC_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Record deploy start time
        id: deploy-timer
        run: echo "start_time=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Deploy with Kamal
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.GHRC_TOKEN }}
          INNGEST_EVENT_KEY: ${{ secrets.INNGEST_EVENT_KEY }}
          INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
          HA_TOKEN: ${{ secrets.HA_TOKEN }}
        run: kamal deploy

      - name: Calculate deploy duration
        id: deploy-duration
        if: always()
        run: |
          START=${{ steps.deploy-timer.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

  notify-result:
    name: Notify Deploy Result
    runs-on: ubuntu-latest
    needs: [notify-start, deploy]
    if: always()
    steps:
      - name: Calculate pipeline duration
        id: duration
        run: |
          START=${{ needs.notify-start.outputs.start_time }}
          NOW=$(date +%s)
          ELAPSED=$((NOW - START))
          MINUTES=$((ELAPSED / 60))
          SECONDS=$((ELAPSED % 60))
          if [ "$MINUTES" -gt 0 ]; then
            echo "text=${MINUTES}m ${SECONDS}s" >> "$GITHUB_OUTPUT"
          else
            echo "text=${SECONDS}s" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy succeeded
        if: needs.deploy.result == 'success'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("Deploy succeeded: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":rocket: Deploy Pipeline :white_check_mark:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline> | <http://homelab|App> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg deploy_duration "${{ needs.deploy.outputs.deploy_duration }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deployed successfully",
                blocks: [
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: (":white_check_mark:  *Deployed — the app is now live* (" + $deploy_duration + ") — <http://homelab|Open App>") }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "white_check_mark"
              }')"

      - name: Deploy failed
        if: needs.deploy.result == 'failure'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("Deploy failed: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":rocket: Deploy Pipeline :x:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg deploy_duration "${{ needs.deploy.outputs.deploy_duration }}" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deploy failed",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (":x:  *Deploy failed* (" + $deploy_duration + ") — <" + $run_url + "|Logs>")
                    }
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "x"
              }')"

      - name: Deploy skipped (checks failed)
        if: needs.deploy.result == 'skipped'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          COMMIT_MSG=$(echo "$COMMIT_MESSAGE" | head -1)
          DURATION="${{ steps.duration.outputs.text }}"

          curl -s -X POST "https://slack.com/api/chat.update" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg commit "$COMMIT_MSG" \
              --arg sha "${{ github.sha }}" \
              --arg commit_url "${{ github.event.head_commit.url }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg duration "$DURATION" \
              '{
                channel: $channel,
                ts: $ts,
                text: ("Deploy skipped: " + $commit),
                blocks: [
                  {
                    type: "header",
                    text: { type: "plain_text", text: ":rocket: Deploy Pipeline :no_entry_sign:", emoji: true }
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("`#" + ($sha | .[:7]) + "`") },
                      { type: "plain_text", text: $commit }
                    ]
                  },
                  {
                    type: "context",
                    elements: [
                      { type: "mrkdwn", text: ("<" + $commit_url + "|Commit> | <" + $run_url + "|Pipeline> | " + $duration) }
                    ]
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "${{ needs.notify-start.outputs.thread_ts }}" \
              --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              --arg pipeline_duration "$DURATION" \
              '{
                channel: $channel,
                thread_ts: $thread_ts,
                text: "Deploy skipped — checks failed",
                blocks: [
                  {
                    type: "section",
                    text: {
                      type: "mrkdwn",
                      text: (":no_entry_sign:  *Deploy skipped* (" + $pipeline_duration + ") — <" + $run_url + "|Logs>")
                    }
                  }
                ]
              }')"

          curl -s -X POST "https://slack.com/api/reactions.add" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg timestamp "${{ needs.notify-start.outputs.thread_ts }}" \
              '{
                channel: $channel,
                timestamp: $timestamp,
                name: "no_entry_sign"
              }')"
